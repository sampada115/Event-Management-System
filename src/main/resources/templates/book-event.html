<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Book Event</title>
<style>
body{font-family:Arial;background:#f2f2f2;padding:30px;}
.card{background:white;padding:30px;max-width:700px;margin:auto;border-radius:10px;}
select,button{width:100%;padding:10px;margin:10px 0;}
button{background:#28a745;color:white;border:none;}
</style>
</head>
<body>
<div class="card">

<h1 th:text="${event.name}"></h1>

<p>
Available Seats:
<span th:text="${seats.size()}"></span>
</p>

<form th:action="@{/events/book/{id}(id=${event.eventId})}" method="post">

<label>Select Seat</label>
<select name="seatId">
<option th:each="seat : ${seats}"
th:value="${seat.seatId}"
th:text="${seat.seatId}"></option>
</select>

<label>Ticket Type</label>
<select name="type">
<option value="REGULAR">REGULAR</option>
<option value="VIP">VIP</option>
</select>

<label>Payment Method</label>
<select name="paymentMethod">
<option value="Credit Card">Credit Card</option>
<option value="UPI">UPI</option>
</select>

<button type="submit">Confirm Booking</button>

</form>

</div>
</body>
</html>
