<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register for Event</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #45a049; }
        a { display: block; text-align: center; margin-top: 15px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Register for Event</h2>
        <p>Click below to confirm your registration.</p>
        <form action="/registration/register" method="post">
            <button type="submit">Confirm Registration</button>
        </form>
        <a href="/registration/all">View My Registrations</a>
    </div>
</body>
</html>
