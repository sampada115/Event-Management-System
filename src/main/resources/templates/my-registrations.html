<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Registrations</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 700px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .message { background: #d4edda; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #4CAF50; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f9f9f9; }
        .badge-confirmed { background: #d4edda; color: #155724; padding: 4px 10px; border-radius: 12px; font-size: 13px; }
        .badge-cancelled { background: #f8d7da; color: #721c24; padding: 4px 10px; border-radius: 12px; font-size: 13px; }
        .badge-pending { background: #fff3cd; color: #856404; padding: 4px 10px; border-radius: 12px; font-size: 13px; }
        .btn-cancel { background: #dc3545; color: white; padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel:hover { background: #c82333; }
        .btn-register { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>My Registrations</h2>

        <!-- success/cancel message -->
        <div class="message" th:if="${message}" th:text="${message}"></div>

        <!-- registrations table -->
        <table th:if="${registrations != null and !#lists.isEmpty(registrations)}">
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            <tr th:each="reg : ${registrations}">
                <td th:text="${reg.id}"></td>
                <td th:text="${reg.registrationDate}"></td>
                <td>
                    <span th:classappend="${reg.status == T(com.eventmgmt.model.enums.RegistrationStatus).CONFIRMED} ? 'badge-confirmed' : (${reg.status == T(com.eventmgmt.model.enums.RegistrationStatus).CANCELLED} ? 'badge-cancelled' : 'badge-pending')"
                          th:text="${reg.status}">
                    </span>
                </td>
                <td>
                    <form th:action="@{/registration/cancel/{id}(id=${reg.id})}" method="get">
                        <button class="btn-cancel"
                                th:disabled="${reg.status == T(com.eventmgmt.model.enums.RegistrationStatus).CANCELLED}"
                                type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
        </table>

        <!-- empty state -->
        <p th:if="${registrations == null or #lists.isEmpty(registrations)}"
           style="color:#999;">No registrations yet.</p>

        <a class="btn-register" href="/registration/register">+ New Registration</a>
    </div>
</body>
</html>
