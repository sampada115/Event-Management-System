<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        .btn {
            display: block;
            background: #4CAF50;
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            text-decoration: none;
            text-align: center;
            margin: 10px 0;
            font-size: 16px;
        }

        .btn:hover {
            background: #45a049;
        }

        .blue {
            background: #007bff;
        }

        .blue:hover {
            background: #0069d9;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Event Management System 🎉</h1>

    <p>Welcome! Choose an option below:</p>

    <a class="btn" href="/events">
        View Events & Book Tickets
    </a>

    <a class="btn blue" href="/registration/all">
        View My Registrations
    </a>
</div>

</body>
</html>
